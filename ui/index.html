<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafin Safezone</title>
    <style>
        :root {
            --panel-bg: rgba(8, 10, 14, 0.72);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.68);
            --safe: #36ff6d;
            --safe-soft: rgba(54, 255, 109, 0.16);
            --link: #90a8ff;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        #displayTextContainer {
            position: fixed;
            top: 2.2vh;
            right: 1.8vw;
            width: min(320px, 31vw);
            min-width: 250px;
            padding: 14px 16px;
            color: var(--text-main);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0)),
                var(--panel-bg);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.38);
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
            transition: opacity 160ms ease, transform 160ms ease;
        }

        #displayTextContainer.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .safezone-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .brand-name {
            min-width: 0;
            overflow: hidden;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 700;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .safe-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            flex: 0 0 auto;
            min-height: 26px;
            padding: 0 9px;
            border: 1px solid rgba(54, 255, 109, 0.24);
            border-radius: 999px;
            background: var(--safe-soft);
            color: var(--safe);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .safe-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--safe);
            box-shadow: 0 0 12px rgba(54, 255, 109, 0.9);
        }

        .safezone-status {
            margin: 0 0 8px;
            color: var(--safe);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .safezone-subtitle {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            margin: 0;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.35;
        }

        .discord-link {
            min-width: 0;
            overflow: hidden;
            color: var(--link);
            text-decoration: none;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .discord-link:hover {
            color: #bdc9ff;
        }

        @media (max-width: 720px) {
            #displayTextContainer {
                top: 12px;
                right: 12px;
                width: calc(100vw - 24px);
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <section id="displayTextContainer" aria-live="polite">
        <div class="safezone-header">
            <div class="brand">
                <div class="brand-name" id="brandText">MAFIN DEVELOPMENT</div>
            </div>
            <div class="safe-pill"><span class="safe-dot"></span> Safe</div>
        </div>

        <p class="safezone-status">Safezone active</p>
        <p class="safezone-subtitle">
            <span>DISCORD:</span>
            <a class="discord-link" id="discordLink" href="https://discord.gg/mafin" target="_blank">discord.gg/mafin</a>
        </p>
    </section>

    <script>
        const panel = document.getElementById('displayTextContainer');
        const brandText = document.getElementById('brandText');
        const discordLink = document.getElementById('discordLink');

        function normalizeDiscordLink(value) {
            const text = String(value || 'discord.gg/mafin').trim();
            if (/^https?:\/\//i.test(text)) {
                return { label: text.replace(/^https?:\/\//i, ''), href: text };
            }
            return { label: text, href: `https://${text}` };
        }

        window.addEventListener('message', function (event) {
            const data = event.data;
            if (!data || data.type !== 'displayText') {
                return;
            }

            if (data.display) {
                brandText.textContent = data.mafinText || 'Mafin RP';

                const discord = normalizeDiscordLink(data.discordText);
                discordLink.textContent = discord.label;
                discordLink.href = discord.href;

                panel.classList.add('is-visible');
            } else {
                panel.classList.remove('is-visible');
            }
        });
    </script>
</body>
</html>
